name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Check formatting (black)
        run: uv run black --check .

      - name: Check import order (isort)
        run: uv run isort --check .

      - name: Check package imports
        run: uv run python -c "from equation.eigen_problem import EigenProblem;
          print('OK')"

      - name: Run dataset info
        run: uv run python data/dataset_info.py
